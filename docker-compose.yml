services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orchestrator
      POSTGRES_USER: orchestrator
      POSTGRES_PASSWORD: orchestrator
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DEBUG: "0"
      DJANGO_SECRET_KEY: change-me
      ALLOWED_HOSTS: "*"
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      POSTGRES_DB: orchestrator
      POSTGRES_USER: orchestrator
      POSTGRES_PASSWORD: orchestrator
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    depends_on:
      - redis
      - postgres
    ports:
      - "8008:8008"

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A orchestrator_backend worker -l info
    working_dir: /app/backend
    environment:
      DEBUG: "0"
      DJANGO_SECRET_KEY: change-me
      ALLOWED_HOSTS: "*"
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      POSTGRES_DB: orchestrator
      POSTGRES_USER: orchestrator
      POSTGRES_PASSWORD: orchestrator
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    depends_on:
      - redis
      - postgres

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8008/api
    depends_on:
      - backend
    ports:
      - "3001:3000"

volumes:
  pg_data:
